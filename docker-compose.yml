# LOCAL DEVELOPMENT stack only — not for production.
#
# This brings up a local MongoDB (+ mongo-express GUI) and the observability
# stack (Loki/Promtail/Grafana) so you can run the full app offline on one box.
#
# Production does NOT use this file and does NOT run a Mongo container: prod
# persistence is MongoDB Atlas via MONGO_URI, and the server runs from
# docker-compose.prod.yml. See the README "Deployment" section.

services:
  mongo:
    image: mongo:7
    container_name: a-meet-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: a-meet-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      # Local-only dev GUI on localhost — login prompt disabled for convenience.
      # (mongo-express 1.0.2 mishandles ME_CONFIG_BASICAUTH_* env vars.)
      ME_CONFIG_BASICAUTH: "false"

  loki:
    image: grafana/loki:3.2.0
    container_name: a-meet-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.2.0
    container_name: a-meet-promtail
    restart: unless-stopped
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - ./server/logs:/logs:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.3.0
    container_name: a-meet-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/loki.yml
    depends_on:
      - loki

volumes:
  mongo-data:
  loki-data:
  grafana-data:
