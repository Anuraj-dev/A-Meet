# Production run surface for the A-Meet backend.
#
# This is the supervisor for the server in production — it replaces the old
# pm2-on-a-mutable-box path. Docker's restart policy keeps the process up, and
# the server's own SIGTERM graceful-drain handles clean restarts/redeploys.
#
# Usage on the production node (image-based release — see README "Deployment"):
#   export SERVER_IMAGE=<account>.dkr.ecr.<region>.amazonaws.com/a-meet-server:<tag>
#   docker compose -f docker-compose.prod.yml pull        # pull the published image tag
#   docker compose -f docker-compose.prod.yml up -d        # start/replace the container
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down        # sends SIGTERM → graceful drain
#
# For a local/manual build instead of pulling a published image, leave SERVER_IMAGE
# unset and run `up -d --build` (uses the build: context below).
#
# Note: this file is intentionally separate from docker-compose.yml (which is the
# local dev/observability stack). Production persistence is Atlas via MONGO_URI —
# no mongo/mongo-express container here.

services:
  server:
    # In production SERVER_IMAGE is the immutable ECR tag the CI pipeline published;
    # `docker compose pull` fetches it instead of rebuilding mediasoup on the box.
    # When SERVER_IMAGE is unset it falls back to a locally built image.
    image: ${SERVER_IMAGE:-a-meet-server:latest}
    # build: is kept for local/manual builds (`up -d --build`); production pulls
    # the prebuilt image and never compiles on the instance.
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: a-meet-server
    # Host networking is required for mediasoup: the WebRtcTransport binds a wide
    # UDP/TCP RTC port range (MEDIASOUP_MIN_PORT..MAX_PORT) that browsers connect
    # to directly. Port-mapping that range through Docker's NAT is impractical and
    # breaks media, so the container shares the host's network namespace.
    network_mode: host
    # Auto-restart on crash/reboot; the server drains gracefully on the SIGTERM
    # Docker sends, so restarts don't drop in-flight media abruptly.
    restart: always
    # Resource ceilings so a runaway process (leaked producers, a busy call)
    # can't starve nginx/system on the box. Honored by `docker compose up`
    # (non-swarm). Sized for a small single node (~2 vCPU / 2-4 GB); raise on a
    # larger instance. Reservation keeps a floor for steady-state mediasoup work.
    mem_limit: 1536m
    mem_reservation: 512m
    cpus: 1.5
    # Readiness probe against the same endpoint the deploy workflow polls
    # (/api/health/ready -> 200 {"ok":true} only when Mongo is connected AND the
    # mediasoup workers are alive; 503 otherwise). This is dependency-aware, so a
    # container that is up but can't actually serve calls is reported unhealthy.
    # The runtime image is node:22-slim with no curl/wget, so use node's global
    # fetch; host networking means the server is reachable on localhost:5000.
    # start_period covers mediasoup worker spin-up.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:5000/api/health/ready').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    environment:
      NODE_ENV: production
      AWS_REGION: ${AWS_REGION:?set AWS_REGION}
      # Every SecureString below this path is loaded before env.ts/server.ts.
      # Explicit compose values still win, which supports emergency overrides.
      SSM_PARAMETER_PREFIX: ${SSM_PARAMETER_PREFIX:-/a-meet/prod/server}
    # Production JSON stdout goes directly to CloudWatch. The log group is
    # provisioned with retention by deploy/aws-observability.sh; Compose must
    # not create an unretained group implicitly.
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:?set AWS_REGION}
        awslogs-group: ${CLOUDWATCH_LOG_GROUP:-/a-meet/prod/server}
        awslogs-stream: ${DEPLOY_ENVIRONMENT:-prod}/server
        awslogs-create-group: "false"
