name: Server image smoke

# Builds the production server image and exercises the runtime by spawning a real
# mediasoup worker (the Dockerfile's `smoke` target). This catches runtime-level
# regressions the unit suites can't — e.g. an unsupported Node major (mediasoup
# requires Node >=22) or a worker binary that won't run in the slim base.
#
# Scoped to changes that can affect the image so the ~15-min mediasoup C++ compile
# doesn't run on unrelated PRs.
on:
  push:
    branches: [main]
    paths:
      - 'server/Dockerfile'
      - 'server/.dockerignore'
      - 'server/package.json'
      - 'server/package-lock.json'
      - 'docker-compose.prod.yml'
  pull_request:
    paths:
      - 'server/Dockerfile'
      - 'server/.dockerignore'
      - 'server/package.json'
      - 'server/package-lock.json'
      - 'docker-compose.prod.yml'

jobs:
  smoke:
    name: Build + mediasoup worker smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # The mediasoup native worker compiles from C++ here (~15 min cold). The
      # `smoke` target then starts a worker on the runtime image; the build fails
      # if the runtime can't actually run mediasoup.
      - name: Build and run smoke target
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          target: smoke
          push: false
          load: true
          tags: a-meet-server:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
