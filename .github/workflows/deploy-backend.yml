name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'deploy/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy server to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/ameet
            git pull origin main
            cd server && npm ci --omit=dev
            pm2 restart ameet-server
