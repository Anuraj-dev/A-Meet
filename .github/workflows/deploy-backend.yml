name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'deploy/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy server to EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # mediasoup compiles from C++ source when deps change (~15 min on t3.small),
          # so allow well over the 10m default. Most deploys skip npm ci and finish in seconds.
          command_timeout: 25m
          script: |
            set -e
            # Non-interactive SSH shells don't load ~/.bashrc, so nvm (and npm/pm2) aren't
            # on PATH until we source it explicitly.
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd ~/ameet
            PREV=$(git rev-parse HEAD)
            git pull origin main
            # Only reinstall (and recompile mediasoup) when the lockfile actually changed.
            if git diff --name-only "$PREV" HEAD | grep -q '^server/package-lock.json$'; then
              echo "Lockfile changed -> npm ci (mediasoup will recompile, may take ~15 min)"
              cd server && npm ci --omit=dev && cd ..
            else
              echo "Lockfile unchanged -> skipping npm ci"
            fi
            pm2 restart ameet-server
            pm2 save

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            if curl -fsS https://api.ameet.raja-dev.me/api/health | grep -q '"ok":true'; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: API not healthy yet, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed: API did not return ok:true after 60s"
          exit 1
