name: E2E smoke

# Runs the Playwright harness smoke test on every PR and on pushes to main, so
# the harness itself stays green. The full feature E2E suite (#35) is NOT wired
# here yet — this only proves the shared harness boots and signs in.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      # Install the whole workspace once from the root. The harness builds the
      # client and boots the server (server/src/server.js imports mongoose &c.),
      # so npm-workspace hoisting must put those deps in the root node_modules
      # where Node resolves them — separate per-package installs in a single job
      # fight that hoisting. --ignore-scripts skips mediasoup's native build; the
      # harness runs with SFU_DISABLED=1, so the worker binary is never used.
      - name: Install workspace deps
        run: npm ci --ignore-scripts

      # Chromium + its OS libraries. Cached by setup-node's npm cache only for
      # the npm packages; the browser binary download is the main cost here.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run E2E smoke
        run: npx playwright test
        working-directory: e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # SFU-ENABLED job (#133): the host-moderation cases that need real media —
  # enforced mute (pause a live mediasoup audio producer) and spotlight's layout
  # effect. Unlike the smoke job it installs deps WITHOUT --ignore-scripts so
  # mediasoup's native worker binary is built, and boots the server with the SFU
  # on (server-launcher.sfu.js, MEDIASOUP_ANNOUNCED_IP=127.0.0.1).
  e2e-sfu:
    name: Playwright SFU host-moderation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      # No --ignore-scripts here: mediasoup compiles its native worker during
      # install, which the SFU-on harness needs at runtime.
      - name: Install workspace deps (with native mediasoup build)
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run SFU E2E
        run: npm run test:sfu
        working-directory: e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-sfu
          path: e2e/playwright-report/
          retention-days: 7
