name: CI

# Runs the test suites on every PR and on pushes to main, so a broken change is
# caught before it reaches production.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  server-lint:
    name: Server lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      # ESLint needs no native build, so --ignore-scripts keeps install fast.
      - run: npm ci --ignore-scripts
      - run: npm run lint

  server:
    name: Server tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      # --ignore-scripts skips mediasoup's native worker build (a ~15-min C++
      # compile). The test suite never imports mediasoup, and esbuild — vitest's
      # transformer — resolves its binary from the @esbuild/* optional-dep
      # package at runtime, so it works without its postinstall.
      - run: npm ci --ignore-scripts
      # Run under coverage so the non-decreasing ratchet (thresholds in
      # vitest.config.js) gates every PR — a coverage drop fails this check.
      - run: npm run test:coverage

  client:
    name: Client tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      # Run under coverage so the non-decreasing ratchet (thresholds in
      # vitest.config.js) gates every PR — a coverage drop fails this check.
      - run: npm run test:coverage
      - run: npm run build
      # Lint is intentionally not a gate yet: RoomPage.jsx has pre-existing
      # react-hooks/set-state-in-effect errors unrelated to the test setup.
      # Re-enable this step once those are resolved:
      # - run: npm run lint
