name: CI

# Runs the test suites on every PR and on pushes to main, so a broken change is
# caught before it reaches production.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  server-lint:
    name: Server lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      # ESLint needs no native build, so --ignore-scripts keeps install fast.
      - run: npm ci --ignore-scripts
      - run: npm run lint

  client-lint:
    name: Client lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json
      # ESLint needs no native build, so --ignore-scripts keeps install fast.
      - run: npm ci --ignore-scripts
      - run: npm run lint

  bot-lint:
    name: Bot lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: bot/package-lock.json
      # ESLint needs no native build, so --ignore-scripts keeps install fast.
      - run: npm ci --ignore-scripts
      - run: npm run lint

  bot:
    name: Bot tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: bot/package-lock.json
      - run: npm ci --ignore-scripts
      # Run under coverage so the non-decreasing ratchet (thresholds in
      # vitest.config.ts) gates every PR — a coverage drop fails this check.
      - run: npm run test:coverage

  server:
    name: Server tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      # --ignore-scripts skips mediasoup's native worker build (a ~15-min C++
      # compile). The test suite never imports mediasoup, and esbuild — vitest's
      # transformer — resolves its binary from the @esbuild/* optional-dep
      # package at runtime, so it works without its postinstall.
      - run: npm ci --ignore-scripts
      # Run under coverage so the non-decreasing ratchet (thresholds in
      # vitest.config.js) gates every PR — a coverage drop fails this check.
      - run: npm run test:coverage

  audit:
    name: npm audit (high)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # --ignore-scripts keeps installs fast (no native builds needed for audit).
      - run: npm ci --ignore-scripts
        working-directory: server
      - run: npm audit --audit-level=high
        working-directory: server
      - run: npm ci --ignore-scripts
        working-directory: client
      - run: npm audit --audit-level=high
        working-directory: client
      - run: npm ci --ignore-scripts
        working-directory: bot
      - run: npm audit --audit-level=high
        working-directory: bot

  client:
    name: Client tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      # Run under coverage so the non-decreasing ratchet (thresholds in
      # vitest.config.js) gates every PR — a coverage drop fails this check.
      - run: npm run test:coverage
      - run: npm run build
