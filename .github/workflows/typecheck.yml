name: Typecheck

# Runs the strict TypeScript type-checker across all workspaces on every PR and
# on pushes to main. While the codebase is still mostly JavaScript this only
# checks the shared contracts and each package's migrated TypeScript (allowJs is
# on, checkJs is off), so it stays green until modules are converted leaf-up.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: Workspaces typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      # Install from the workspace root so @a-meet/contracts is linked and the
      # hoisted TypeScript compiler is available. --ignore-scripts skips
      # mediasoup's ~15-min native build — the type-checker never runs it.
      - run: npm ci --ignore-scripts
      - run: npm run typecheck
