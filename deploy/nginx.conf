# Backend-only nginx config.
# Vercel serves the React frontend. EC2 (this server) only handles:
#   /api/*       — Express REST + auth
#   /socket.io/* — Socket.io WebSocket upgrade
#
# Domain setup:
#   yourdomain.com      → Vercel (add in Vercel project settings)
#   api.yourdomain.com  → EC2 Elastic IP (DNS A record)
#
# Before applying: replace API_DOMAIN and TURN_DOMAIN with their actual hostnames.

server {
    listen 80;
    server_name API_DOMAIN TURN_DOMAIN;

    # Certbot HTTP-01 challenges must remain on HTTP. This keeps the normal
    # API redirect while allowing automated issuance and renewal for coturn.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name API_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/API_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/API_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Catch-all: any path not matched above returns 404 (no static files on EC2)
    location / {
        return 404;
    }
}
